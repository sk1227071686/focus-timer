<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>专注计时器 45+X</title>
  <style>
    /* =============================================
       全局 / 根变量
       低饱和度、柔和深色系，长期护眼
    ============================================= */
    :root {
      /* 轻量文档风格（向 Django 文档致敬） */
      --bg:         #f8fafc;   /* 页面背景：近白柔和 */
      --surface:    #ffffff;   /* 卡片背景：白 */
      --border:     #e6eef3;   /* 细边框 */
      --text-pri:   #0f1724;   /* 主文字：深色 */
      --text-sec:   #475569;   /* 次文字：中性灰 */
      --text-dim:   #6b7280;   /* 暗淡文字 */
      --accent-f:   #0a6b5f;   /* 专注强调：Django 绿调 */
      --accent-b:   #0c64b8;   /* 休息强调：蓝 */
      --accent-idle:#94a3b8;   /* idle 强调色：淡灰蓝 */
      --btn-bg:     #f1f5f9;   /* 按钮背景 */
      --btn-hover:  #e2e8f0;   /* 按钮悬停 */
      --btn-active: #cbd5e1;   /* 按钮激活 */
      --danger:     #b91c1c;   /* 危险/重置色 */
      --radius:     8px;
      --transition: 0.18s ease;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text-pri);
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      line-height: 1.6;
    }

    /* =============================================
       标题
    ============================================= */
    .app-title {
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.12em;
      color: var(--text-sec);
      margin-bottom: 32px;
      text-align: center;
    }
    .app-title span {
      color: var(--text-pri);
      font-weight: 600;
    }

    /* =============================================
       主卡片
    ============================================= */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px 48px;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    /* =============================================
       倒计时显示
    ============================================= */
    .timer-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 100%;
    }

    .timer-ring {
      position: relative;
      width: 180px;
      height: 180px;
    }
    .timer-ring svg {
      transform: rotate(-90deg);
    }
    .ring-track {
      fill: none;
      stroke: var(--border);
      stroke-width: 6;
    }
    .ring-progress {
      fill: none;
      stroke: var(--accent-idle);
      stroke-width: 6;
      stroke-linecap: round;
      stroke-dasharray: 502;     /* 2π × 79.9 ≈ circumference for r=80 */
      stroke-dashoffset: 0;
      transition: stroke-dashoffset 0.9s linear, stroke var(--transition);
    }
    .timer-text {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .timer-digits {
      font-size: 46px;
      font-weight: 300;
      letter-spacing: 0.04em;
      color: var(--text-pri);
      font-variant-numeric: tabular-nums;
    }

    /* =============================================
       状态标签
    ============================================= */
    .phase-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: var(--text-sec);
      padding: 4px 14px;
      border-radius: 99px;
      border: 1px solid var(--border);
      background: var(--bg);
      transition: color var(--transition), border-color var(--transition);
    }
    .phase-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent-idle);
      transition: background var(--transition);
    }

    /* =============================================
       休息时长选择
    ============================================= */
    .break-select-label {
      font-size: 12px;
      color: var(--text-dim);
      letter-spacing: 0.06em;
      align-self: flex-start;
    }
    .break-btns {
      display: flex;
      gap: 10px;
      width: 100%;
    }
    .break-btn {
      flex: 1;
      padding: 9px 0;
      font-size: 13px;
      font-weight: 500;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--btn-bg);
      color: var(--text-sec);
      cursor: pointer;
      transition: background var(--transition), border-color var(--transition), color var(--transition);
    }
    .break-btn:hover:not(:disabled) { background: var(--btn-hover); color: var(--text-pri); }
    .break-btn.active {
      border-color: var(--accent-b);
      color: var(--accent-b);
      background: #1f2e28;
    }
    .break-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* =============================================
       控制按钮
    ============================================= */
    .ctrl-btns {
      display: flex;
      gap: 10px;
      width: 100%;
    }
    .btn {
      flex: 1;
      padding: 11px 0;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.05em;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--btn-bg);
      color: var(--text-pri);
      cursor: pointer;
      transition: background var(--transition), border-color var(--transition), opacity var(--transition);
    }
    .btn:hover:not(:disabled) { background: var(--btn-hover); }
    .btn:active:not(:disabled) { background: var(--btn-active); }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn.primary {
      background: #1e2d42;
      border-color: var(--accent-f);
      color: var(--accent-f);
    }
    .btn.primary:hover:not(:disabled) { background: #263853; }
    .btn.danger {
      background: #2e1f1f;
      border-color: var(--danger);
      color: var(--danger);
    }
    .btn.danger:hover:not(:disabled) { background: #3a2626; }
    .btn.skip {
      background: #1f2d24;
      border-color: var(--accent-b);
      color: var(--accent-b);
    }
    .btn.skip:hover:not(:disabled) { background: #263a2e; }

    /* =============================================
       今日统计
    ============================================= */
    .stats-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 28px;
      width: 100%;
      max-width: 420px;
      margin-top: 12px;
    }
    .stats-title {
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      margin-bottom: 14px;
      text-transform: uppercase;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .stat-item { display: flex; flex-direction: column; gap: 3px; }
    .stat-value {
      font-size: 24px;
      font-weight: 300;
      color: var(--text-pri);
      font-variant-numeric: tabular-nums;
    }
    .stat-label { font-size: 11px; color: var(--text-sec); }

    /* =============================================
       弹窗提醒遮罩
    ============================================= */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(4px);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .overlay.show { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 36px 40px;
      max-width: 340px;
      width: 90%;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 16px;
      animation: popIn 0.22s ease;
    }
    @keyframes popIn {
      from { transform: scale(0.88); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }
    .modal-icon { font-size: 40px; }
    .modal-title { font-size: 20px; font-weight: 600; color: var(--text-pri); }
    .modal-sub   { font-size: 13px; color: var(--text-sec); line-height: 1.7; }
    .modal-btn {
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity var(--transition);
    }
    .modal-btn:hover { opacity: 0.85; }
    .modal-btn.focus-color { background: var(--accent-f); color: #111; }
    .modal-btn.break-color { background: var(--accent-b); color: #111; }

    /* =============================================
       连接状态提示
    ============================================= */
    .conn-bar {
      position: fixed;
      top: 12px;
      right: 16px;
      font-size: 11px;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .conn-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent-idle);
      transition: background var(--transition);
    }
    .conn-dot.ok   { background: var(--accent-b); }
    .conn-dot.err  { background: var(--danger); }
  </style>
</head>
<body>

<!-- 连接状态 -->
<div class="conn-bar">
  <div class="conn-dot" id="connDot"></div>
  <span id="connLabel">连接中…</span>
</div>

<!-- 标题 -->
<h1 class="app-title"><span>专注计时器</span> &nbsp;45 + X</h1>

<!-- 主卡片 -->
<div class="card">

  <!-- 倒计时环 -->
  <div class="timer-wrap">
    <div class="timer-ring">
      <svg viewBox="0 0 180 180" width="180" height="180">
        <circle class="ring-track"    cx="90" cy="90" r="80" />
        <circle class="ring-progress" cx="90" cy="90" r="80" id="ringProgress" />
      </svg>
      <div class="timer-text">
        <div class="timer-digits" id="timerDigits">45:00</div>
      </div>
    </div>
    <!-- 状态标签 -->
    <div class="phase-badge" id="phaseBadge">
      <span class="phase-dot" id="phaseDot"></span>
      <span id="phaseText">待机中</span>
    </div>
  </div>

  <!-- 休息时长选择 -->
  <div style="width:100%;display:flex;flex-direction:column;gap:8px;">
    <span class="break-select-label">休息时长（专注结束后生效）</span>
    <div class="break-btns">
      <button class="break-btn active" data-sec="300"  onclick="selectBreak(this, 300)">5 分钟</button>
      <button class="break-btn"        data-sec="600"  onclick="selectBreak(this, 600)">10 分钟</button>
      <button class="break-btn"        data-sec="900"  onclick="selectBreak(this, 900)">15 分钟</button>
    </div>
  </div>

  <!-- 控制按钮 -->
  <div class="ctrl-btns">
    <button class="btn primary" id="btnStart"     onclick="doStart()">开始</button>
    <button class="btn"         id="btnPause"     onclick="doPause()"  disabled>暂停</button>
    <button class="btn danger"  id="btnReset"     onclick="doReset()">重置</button>
    <button class="btn skip"    id="btnSkip"      onclick="doSkip()"   disabled>跳过</button>
  </div>

</div>

<!-- 今日统计 -->
<div class="stats-card">
  <div class="stats-title">今日统计</div>
  <div class="stats-grid">
    <div class="stat-item">
      <span class="stat-value" id="statFocus">0</span>
      <span class="stat-label">专注次数</span>
    </div>
    <div class="stat-item">
      <span class="stat-value" id="statBreak">0</span>
      <span class="stat-label">休息次数</span>
    </div>
    <div class="stat-item">
      <span class="stat-value" id="statTotal">0 h</span>
      <span class="stat-label">专注时长</span>
    </div>
  </div>
</div>

<!-- 弹窗提醒遮罩 -->
<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <div class="modal-icon" id="modalIcon">🎉</div>
    <div class="modal-title" id="modalTitle">专注结束！</div>
    <div class="modal-sub"   id="modalSub">已完成 45 分钟专注，请休息一下。</div>
    <button class="modal-btn focus-color" id="modalBtn" onclick="closeModal()">好的</button>
  </div>
</div>

<script src="./app.js"></script>
</body>
</html>
